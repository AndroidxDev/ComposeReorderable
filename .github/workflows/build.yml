name: Build Library

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Permission
        run: chmod +x gradlew

      - name: Update Yarn lock
        run: ./gradlew kotlinUpgradeYarnLock

      - name: Build
        run: ./gradlew build
