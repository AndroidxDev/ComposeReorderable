name: Build Reorderable Library

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Permission
        run: chmod +x gradlew

      - name: Build reorderable module only
        run: ./gradlew :reorderable:jvmJar

      - name: Upload full build folder
        uses: actions/upload-artifact@v4
        with:
          name: reorderable-build
          path: reorderable/build/
